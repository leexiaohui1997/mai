services:
  redis:
    image: redis:7-alpine
    container_name: mai-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - mai-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mai-redis-commander
    ports:
      - '8081:8081'
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - mai-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  mai-network:
    name: mai-network
